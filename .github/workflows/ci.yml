name: CI — Cloud File Converter

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend Tests ──────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cloudconv_test
          POSTGRES_USER: cloudconv
          POSTGRES_PASSWORD: cloudconv
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.testing
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DATABASE_URL: postgres://cloudconv:cloudconv@localhost:5432/cloudconv_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      AWS_ACCESS_KEY_ID: test-key-id
      AWS_SECRET_ACCESS_KEY: test-secret-key
      AWS_STORAGE_BUCKET_NAME: test-bucket
      AWS_S3_REGION_NAME: us-east-1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements/development.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements/development.txt

      - name: Run linting (ruff)
        run: ruff check backend/
        continue-on-error: false

      - name: Run type checking (mypy)
        run: mypy backend/apps/ --ignore-missing-imports
        continue-on-error: true  # non-blocking for now

      - name: Run migrations
        run: python backend/manage.py migrate --noinput

      - name: Run tests with coverage
        run: |
          cd backend
          pytest \
            --cov=apps \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results-py${{ matrix.python-version }}
          path: backend/test-results.xml

  # ── Frontend Tests ─────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run linting (ESLint)
        run: cd frontend && npm run lint
        continue-on-error: false

      - name: Run type checking
        run: cd frontend && npx tsc --noEmit
        continue-on-error: false

      - name: Build production bundle
        run: cd frontend && npm run build
        env:
          VITE_API_URL: https://api.cloudfileconverter.com/api/v1
          VITE_APP_NAME: Cloud File Converter

      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sh frontend/dist/ | cut -f1)
          echo "📦 Bundle size: $BUNDLE_SIZE"

  # ── Security Scan ──────────────────────────────────────────────────────────
  security-scan:
    name: Security Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r backend/requirements/production.txt
        continue-on-error: true  # Report but don't block

      - name: Audit npm dependencies
        run: cd frontend && npm audit --audit-level=high
        continue-on-error: true

  # ── Django Deployment Check ────────────────────────────────────────────────
  django-deploy-check:
    name: Django Deploy Check
    runs-on: ubuntu-latest
    needs: backend-tests

    env:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ci-deploy-check-key-not-for-production
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost
      DATABASE_URL: sqlite:///db_check.sqlite3
      REDIS_URL: redis://localhost:6379/0
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_STORAGE_BUCKET_NAME: test
      AWS_S3_REGION_NAME: us-east-1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install production dependencies
        run: pip install -r backend/requirements/production.txt

      - name: Run Django deploy check
        run: cd backend && python manage.py check --deploy --fail-level WARNING
        continue-on-error: true  # Some checks require actual DB
