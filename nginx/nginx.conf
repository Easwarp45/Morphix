# ============================================================
# Cloud File Converter — Nginx Production Configuration
# ============================================================
# Deploy on Ubuntu/Debian EC2 instance.
# Place at: /etc/nginx/sites-available/cloudfileconverter
# Symlink: ln -s /etc/nginx/sites-available/cloudfileconverter /etc/nginx/sites-enabled/

# ── Rate Limiting Zones ─────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

# ── Redirect HTTP → HTTPS ───────────────────────────────────
server {
    listen 80;
    server_name api.cloudfileconverter.com cloudfileconverter.com www.cloudfileconverter.com;
    return 301 https://$host$request_uri;
}

# ── API Backend (HTTPS) ─────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.cloudfileconverter.com;

    # ── SSL (managed by Certbot) ────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.cloudfileconverter.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cloudfileconverter.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Upload size ─────────────────────────────────────────
    client_max_body_size 60M;
    client_body_timeout  60s;

    # ── Static files ────────────────────────────────────────
    location /static/ {
        alias /var/www/cloudfileconverter/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── WebSocket (Django Channels) ─────────────────────────
    location /ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── Auth endpoints (strict rate-limit) ──────────────────
    location ~ ^/api/v1/auth/(login|register|token) {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── File upload endpoints ───────────────────────────────
    location /api/v1/files/ {
        limit_req zone=upload burst=20 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── General API ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Health Check (no rate limit) ────────────────────────
    location /api/v1/health/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ── Admin ───────────────────────────────────────────────
    location /admin/ {
        allow 0.0.0.0/0;  # Restrict to your office IP in production
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Deny hidden files ───────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
