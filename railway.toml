# Morphix â€” Railway Deployment Configuration
# =============================================================================
# Docs: https://docs.railway.app/reference/railway-toml

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd backend && gunicorn config.asgi:application -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
healthcheckPath = "/api/v1/health/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "api"
source = "backend"

[services.build]
buildCommand = "pip install -r requirements/production.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput"

[services.deploy]
startCommand = "gunicorn config.asgi:application -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"

[[services]]
name = "celery-worker"
source = "backend"

[services.deploy]
startCommand = "celery -A config.celery worker --loglevel=info --concurrency=2"

[[services]]
name = "celery-beat"
source = "backend"

[services.deploy]
startCommand = "celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
